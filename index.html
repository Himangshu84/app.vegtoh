    <body>
        <!-- Content Wrapper -->
        <div class="login-wrapper">
            <div class="back-link">
                <a href="index-2.html" class="btn btn-add">Back to Dashboard</a>
            </div>
            <div class="container-center">
            <div class="login-area">
                <div class="panel panel-bd panel-custom">
                    <div class="panel-heading">
                        <div class="view-header">
                            <div class="header-icon">
                                <i class="pe-7s-unlock"></i>
                            </div>
                            <div class="header-title">
                                <h3>Login</h3>
                               <div id="loginMsg" style="display:none; margin-top:10px;"></div>
                            </div>
                        </div>
                    </div>
                    <div class="panel-body">
                      <form action="" id="loginForm" novalidate> 
                        <div class="form-group"> <label class="control-label" for="username">Username</label> 
                            <input type="text" placeholder="User Name" title="Please enter you username" required="" value="" name="admin_user" id="admin_user" class="form-control"> 
                            <span class="help-block small">Your unique username to app</span> </div> <div class="form-group"> 
                                <label class="control-label" for="password">Password</label> 
                                <input type="password" title="Please enter your password" placeholder="******" required="" value="" name="admin_pwd" id="admin_pwd" class="form-control">
                                 <span class="help-block small">Your strong password</span> </div> <div> 
                                    <button type="submit" class="btn btn-add" id="loginBtn">Login</button> 
                                    <a class="btn btn-warning" href="register.html">Register</a> 
                                </div> </form>
                        </div>
                        </div>
                </div>
            </div>
        </div>
        <!-- /.content-wrapper -->
        <!-- jQuery -->
        <script src="assets/plugins/jQuery/jquery-1.12.4.min.js" type="text/javascript"></script>
        <!-- bootstrap js -->
        <script src="assets/bootstrap/js/bootstrap.min.js" type="text/javascript"></script>
    </body>
<script>
let base_url;

// auto detect
if (window.location.hostname === "localhost") {
    base_url = window.location.origin + "/app.vegtoh/backendapi";
} else {
    base_url = window.location.origin + "/backendapi";
}

document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    let formData = new FormData(this);

    fetch(base_url + "/login/do_login", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        let msgBox = document.getElementById("loginMsg");

        if(data.status){
            msgBox.style.display = "block";
            msgBox.style.color = "green";
            msgBox.innerHTML = "Login Successful... Redirecting ⏳";

            // 🔥 2 sec পরে redirect
            setTimeout(() => {
                window.location.href = "home.html";
            }, 2000);

        } else {
            msgBox.style.display = "block";
            msgBox.style.color = "red";
            msgBox.innerHTML = data.message;
        }
    })
    .catch(err => {
        console.log(err);
        alert("Server Error ❌");
    });
});
</script>
